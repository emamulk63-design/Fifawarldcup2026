<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>জয়া ভাইয়ের লাইভ টিভি</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
background:#e50914;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.player{
padding:10px;
text-align:center;
position:sticky;
top:0;
background:#111;
z-index:10;
}

video{
width:100%;
max-height:500px;
background:black;
border-radius:10px;
}

button{
background:#e50914;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#222;
padding:10px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.card:hover{background:#333;}

.card img{
width:70px;
height:70px;
object-fit:contain;
}

h3{font-size:14px;}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

#popup img{
width:90%;
max-width:350px;
border-radius:12px;
}

</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/IMG_20260610_184322_866.jpg">
</div>

<header>
📺 জয়া ভাইয়ের লাইভ টিভি
</header>

<div class="player">

<video id="video" controls autoplay playsinline></video>

<br>

<button onclick="fullScreen()">⛶ Full Screen</button>
<button onclick="expand()">🔄 Expand</button>

</div>

<div class="container">

<!-- T SPORTS HD -->
<div class="card" onclick="play('https://tvsen7.aynaott.com/tsports-hd/index.m3u8')">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/tsports.png">
<h3>T Sports HD</h3>
</div>

<!-- T SPORTS 720 (FIXED) -->
<div class="card" onclick="play('https://tvsen7.aynaott.com/tsports-hd/index.m3u8')">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/tsports.png">
<h3>T Sports 720</h3>
</div>

<!-- T SPORTS 1080 -->
<div class="card" onclick="play('https://tvsen7.aynaott.com/tsportsfhd/index.m3u8')">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/tsports.png">
<h3>T Sports 1080</h3>
</div>

<!-- SOMOY FIFA -->
<div class="card" onclick="play('https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8')">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/somoytvfifa.jpg">
<h3>Somoy TV FIFA</h3>
</div>

<!-- SOMOY TV -->
<div class="card" onclick="play('https://tvsen6.aynaott.com/somoytv/index.m3u8')">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/somoytv.png">
<h3>Somoy TV</h3>
</div>

<!-- BTV -->
<div class="card" onclick="play('https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8')">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/Btv.png">
<h3>BTV</h3>
</div>

</div>

<script>

let video=document.getElementById("video");
let hls;

/* AUTO START */
window.onload=function(){

setTimeout(()=>{
document.getElementById("popup").style.display="none";
},2000);

play('https://tvsen7.aynaott.com/tsports-hd/index.m3u8');
}

/* PLAY */
function play(url){

if(hls){
hls.destroy();
}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}
}

/* FULLSCREEN FIX */
function fullScreen(){
if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitEnterFullscreen){
video.webkitEnterFullscreen();
}
}

/* EXPAND MODE */
function expand(){
let p=document.querySelector(".player");

if(p.style.position!="fixed"){
p.style.position="fixed";
p.style.top="0";
p.style.left="0";
p.style.width="100vw";
p.style.height="100vh";
p.style.background="black";
p.style.zIndex="99999";
}else{
p.style.position="sticky";
}
}

</script>

</body>
</html>
